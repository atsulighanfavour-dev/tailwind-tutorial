<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Find your email Enter your phone number or recovery email</title>
    <link href="css/styles.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <div
      class="min-h-screen flex flex-col lg:items-center lg:justify-center px-3"
    >
      <!-- Main content -->

      <main class="flex-1 w-full max-w-220 text-white lg:mt-18">
        <div
          class="lg:bg-[black] sm:rounded-3xl lg:shadow-sm px-2 sm:px-3 lg:px-12 py-9 lg:py-11 grid gap-5"
        >
          <img
            src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
            alt="Google"
            class="w-10 h-10"
          />

          <div class="grid sm:grid-cols-2 gap-8 text-left">
            <!-- Left side -->
            <div class="grid content-start gap-8">
              <div class="grid gap-3">
                <h1 class="text-4xl">Find your email</h1>
                <p>
                  Enter your phone number or recovery email
                </p>
              </div>
            </div>

            <!-- Right side -->
            <div class="grid gap-8 lg:gap-32 content-between text-sm">
              <div class="grid gap-2">
                <input
                  class="placeholder:text-lg peer w-full h-14 rounded border border-gray-400 px-4"
                  type="text"
                  placeholder="Phone number or email"
                />
              </div>

              <div class="flex flex-col gap-15 sm:gap-12 lg:gap-14">
                <div
                  class="flex justify-end"
                >
                  <button
                    class="bg-[#A8C7FA] text-[#1F3B73] px-6 py-2 rounded-full font-medium"
                  >
                    Next
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>

      <!-- footer -->
      <div
        class="text-xs text-white flex lg:w-208 justify-between mb-4 lg:mb-29"
      >
        <select>
          <option class="text-black">English (United States)</option>
          <option class="text-black">Deutsch</option>
          <option class="text-black">Español (España)</option>
          <option class="text-black">Filipino</option>
        </select>

        <div class="flex gap-4">
          <div>
            <a
              href="https://support.google.com/accounts?hl=en&visit_id=639187308603736201-1173184824&rd=2&p=account_iph#topic=3382296"
              target="_blank"
              rel="noopener noreferrer"
              >Help</a
            >
          </div>

          <div>
            <a
              href="https://policies.google.com/privacy?gl=NG&hl=en-US"
              target="_blank"
              rel="noopener noreferrer"
              >Privacy</a
            >
          </div>
          <a
            href="https://policies.google.com/terms?gl=NG&hl=en-US"
            target="_blank"
            rel="noopener noreferrer"
            >Terms</a
          >
        </div>
      </div>
    </div>
  </body>
</html>
